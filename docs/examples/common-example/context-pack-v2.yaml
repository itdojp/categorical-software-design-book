# この YAML は共通例題の Context Pack v2 入力例・local 検証用インスタンスです。
# v2 は v1 の Objects/Morphisms/Diagrams/Acceptance tests を残したまま、
# データ契約・効果境界・Agent Runtime・検証証跡を追加する拡張です。
# 形式と必須項目の正本は docs/spec/context-pack-v2.md、
# reader-facing な導線は公開の /examples/common-example/ を参照してください。
version: 2
context_pack_version: 2
name: common-example-order-processing-v2

problem_statement:
  goals:
    - 注文の作成から出荷までの一連の処理を、境界と不変条件（可換性）で記述できる
    - 監査ログを「後付け」ではなく契約として扱う
  non_goals:
    - 決済事業者・配送事業者の具体実装の詳細化
    - "高度な最適化（例: 強い整合性を必要としない最適化）"

domain_glossary:
  terms:
    - term: Order
      ja: 注文
      note: 注文状態（Draft/Placed/Paid/Shipped/Cancelled）を持つ
    - term: Payment
      ja: 決済
      note: 承認/取消/返金などを含む
    - term: Inventory
      ja: 在庫
      note: 引当（Reservation）を中心に扱う
    - term: Shipment
      ja: 出荷
      note: 出荷指示/出荷完了
    - term: Audit
      ja: 監査
      note: 重要操作の追跡可能性（監査証跡）

objects:
  - id: Order
    kind: entity
    states: [Draft, Placed, Paid, Shipped, Cancelled]
    fields:
      - orderId
      - items
      - totalAmount
      - state
      - displayName
      - shippingMemo
  - id: Payment
    kind: entity
    fields:
      - paymentId
      - orderId
      - amount
      - status
  - id: InventoryReservation
    kind: entity
    fields:
      - reservationId
      - orderId
      - items
      - status
  - id: Shipment
    kind: entity
    fields:
      - shipmentId
      - orderId
      - status
  - id: AuditEvent
    kind: event
    fields:
      - eventId
      - occurredAt
      - actor
      - action
      - target
      - payloadHash
      - lineage

morphisms:
  - id: CreateOrder
    input: { items: "OrderItem[]", paymentMethod: "PaymentMethod" }
    output: { orderId: "OrderId" }
    pre:
      - items が空でない
    post:
      - Order が Draft で作成される
      - AuditEvent("CreateOrder") が記録される
    failures:
      - ValidationError
  - id: PlaceOrder
    input: { orderId: "OrderId" }
    output: { orderId: "OrderId" }
    pre:
      - Order.state == Draft
    post:
      - Order.state == Placed
      - InventoryReservation が作成される（または更新される）
      - AuditEvent("PlaceOrder") が記録される
    failures:
      - NotFound
      - InvalidState
      - OutOfStock
  - id: AuthorizePayment
    input: { orderId: "OrderId" }
    output: { paymentId: "PaymentId" }
    pre:
      - Order.state == Placed
      - InventoryReservation.status == Reserved
    post:
      - Payment.status == Authorized
      - Order.state == Paid
      - AuditEvent("AuthorizePayment") が記録される
    failures:
      - PaymentDeclined
      - InvalidState
  - id: ShipOrder
    input: { orderId: "OrderId" }
    output: { shipmentId: "ShipmentId" }
    pre:
      - Order.state == Paid
    post:
      - Shipment.status == Shipped
      - Order.state == Shipped
      - AuditEvent("ShipOrder") が記録される
    failures:
      - InvalidState

diagrams:
  - id: D1-idempotency-place-order
    statement: PlaceOrder は同一 orderId に対して冪等である（重複実行で在庫引当や監査が二重計上されない）
    verification:
      - 同一リクエストID（または同一 orderId + idempotency key）で2回実行しても InventoryReservation が1つに収束する
      - AuditEvent が重複記録されない（または重複が識別可能で後段集計が二重化しない）
  - id: D2-audit-consistency
    statement: 重要操作（CreateOrder/PlaceOrder/AuthorizePayment/ShipOrder）は必ず監査証跡を残す
    verification:
      - 各操作が成功した場合、対応する AuditEvent が存在する
      - 監査イベントの payloadHash が改竄検知に使える
  - id: D3-state-transition-safety
    statement: "状態遷移は単調であり、禁止遷移（例: Shipped → Paid）は起きない"
    verification:
      - 受入テストで禁止遷移を試みた場合 InvalidState になる

constraints:
  security:
    - 監査イベントは削除不可（論理削除も禁止、訂正は追記で行う）
    - actor（操作者）を必須にする（匿名操作は不可）
  operations:
    - 監査イベントの検索・エクスポート経路を用意する
    - 検索は occurredAt の期間、actor/action/target でフィルタできる
    - エクスポートは CSV または JSON を提供し、権限によりアクセス制御される

acceptance_tests:
  - id: AT1-happy-path
    scenario: CreateOrder → PlaceOrder → AuthorizePayment → ShipOrder が成功する
    expected:
      - Order.state == Shipped
      - 各操作に対応する AuditEvent が存在する
  - id: AT2-invalid-transition
    scenario: Draft の Order に対して ShipOrder を呼ぶ
    expected:
      - InvalidState
  - id: AT3-audit-search-export
    scenario: 監査イベントを actor/action/target/期間 で検索し、CSV または JSON でエクスポートする
    expected:
      - 検索結果に CreateOrder/PlaceOrder/AuthorizePayment/ShipOrder の監査イベントが含まれる
      - 権限のない actor は検索・エクスポートできない

coding_conventions:
  language: language-agnostic
  directory:
    - "chapters/ (book contents)"
    - "appendices/ (book contents)"
    - "docs/ (specs/examples)"
  dependencies:
    policy: "追加前にIssueで合意する"

forbidden_changes:
  - D2-audit-consistency を満たさない実装変更
  - Order の状態モデル（states）を合意なく変更


data_contracts:
  schemas:
    - id: OrderSchema
      object: Order
      fields: [orderId, items, totalAmount, state, displayName, shippingMemo]
      source_of_truth: Order service database
    - id: AuditEventSchema
      object: AuditEvent
      fields: [eventId, occurredAt, actor, action, target, payloadHash, lineage]
      source_of_truth: append-only audit log
    - id: LegacyOrderDB
      role: source
      object: Order
      fields: [OrderId, PaymentAuthorization, legacy_internal_status_text]
      source_of_truth: legacy order database
    - id: OrderReadModel
      role: target
      object: OrderReadModel
      fields: [OrderId, paymentAuthorizationStatus, auditLineage]
      source_of_truth: read model projection
  mappings:
    - id: OrderToAuditTarget
      from: Order.orderId
      to: AuditEvent.target
      purpose: "注文操作と監査証跡を結び付ける"
    - id: PaymentToOrder
      from: Payment.orderId
      to: Order.orderId
      purpose: "決済承認が対象注文へ対応することを確認する"
    - id: legacy_to_read_model
      source: LegacyOrderDB
      target: OrderReadModel
      preserves:
        - OrderId
        - PaymentAuthorization
        - AuditEvent.lineage
      does_not_preserve:
        - legacy_internal_status_text
      purpose: "旧注文DBから取消・決済確認用のread modelを作る"
  migration_verification:
    - type: row_count_invariant
      expected: "LegacyOrderDB の対象注文数と OrderReadModel の対象行数を照合する"
    - type: foreign_key_preservation
      expected: "OrderId を基準に PaymentAuthorization と AuditEvent.lineage が対応する"
    - type: lineage_trace_check
      expected: "OrderReadModel.auditLineage から元の AuditEvent へ追跡できる"
    - type: acceptance_query
      expected: "取消済み注文の read model に CancelOrder の監査 lineage が残る"

open_systems:
  components:
    - id: OrderService
      boundary: "Order の状態遷移と注文API"
      boundary_in:
        - CancelOrderCommand
      boundary_out:
        - OrderCancelled
        - PaymentCancelRequested
    - id: PaymentService
      boundary: "決済承認・取消。外部決済事業者の詳細は扱わない"
    - id: PaymentAdapter
      boundary: "外部決済APIの詳細を隠蔽し、AuthorizePayment / CancelPayment 契約に閉じ込める"
      boundary_in:
        - AuthorizePayment
      boundary_out:
        - PaymentAuthorized
        - PaymentRejected
        - PaymentCancelled
      internal_effects:
        - ExternalAPI
        - Retry
        - Audit
    - id: InventoryService
      boundary: "在庫引当と解除"
    - id: ShippingService
      boundary: "出荷指示と出荷完了"
    - id: AuditLog
      boundary: "重要操作の追記専用証跡"
  boundaries:
    - id: ExternalPaymentBoundary
      rule: "決済事業者APIの詳細を Context Pack 内へ混ぜず、AuthorizePayment の入出力契約に閉じ込める"
    - id: PaymentSharedBoundary
      shared_interface:
        - OrderId
        - PaymentRequestId
      rule: "OrderService と PaymentAdapter はこの shared boundary だけで合成する"
    - id: AuditExportBoundary
      rule: "監査検索・エクスポートは権限付き read model 経由に限定する"
  composition:
    - id: HappyPathComposition
      sequence: [CreateOrder, PlaceOrder, AuthorizePayment, ShipOrder]
      invariant: "D2-audit-consistency と D3-state-transition-safety を維持する"
    - id: OrderPaymentComposition
      shared_boundary:
        - OrderId
        - PaymentRequestId
      method: compose_by_shared_interface
      participants:
        - OrderService
        - PaymentAdapter
      expected_property:
        - no_orphan_payment_request
        - audit_event_preserved
      verification:
        - D2-audit-consistency
        - payment_cancel_request_has_order

views:
  lenses_or_optics:
    - id: OrderSummaryView
      source: Order
      view: OrderSummaryDTO
      get:
        description: "Order と AuditEvent lineage から UI 表示用 DTO を作る"
        preserves:
          - OrderId
          - state
          - auditLineage
      put:
        description: "UI/API から許可された表示メモだけを Order へ戻す"
        allowed_updates:
          - displayName
          - shippingMemo
      laws:
        - get_after_put_consistency
        - put_after_get_no_spurious_change
      forbidden_updates:
        - change_payment_authorization_directly
        - mutate_audit_history
    - id: OrderLifecycleView
      source: Order
      focus: state
      update_rule: "Draft/Placed/Paid/Shipped/Cancelled の状態遷移だけを変更対象にする"
    - id: AuditSearchView
      source: AuditEvent
      focus: [occurredAt, actor, action, target]
      update_rule: "検索条件の追加は payloadHash と追記専用制約を変えない"

effects:
  operations:
    - id: PersistOrder
      kind: write
      target: OrderService
    - id: ReserveInventory
      kind: external-call
      target: InventoryService
      input: ReserveInventoryInput
      output: ReserveInventoryResult
      possible_failures:
        - OutOfStock
        - InventoryServiceTimeout
      required_properties:
        - idempotent_by_order_id
        - audited
    - id: AppendAuditEvent
      kind: write-once
      target: AuditLog
    - id: ExportAuditEvents
      kind: read-export
      target: AuditLog
  handlers:
    - id: OrderRepository
      handles: [PersistOrder]
    - id: ProductionInventoryHandler
      operation: ReserveInventory
      implementation: InventoryService.MCP
      retry_policy: bounded
      timeout_ms: 3000
      audit_sink: OrderAuditLog
    - id: TestInventoryHandler
      operation: ReserveInventory
      implementation: InMemoryFake
      allowed_environments:
        - test
        - local
    - id: AuditAppender
      handles: [AppendAuditEvent]
    - id: AuditExporter
      handles: [ExportAuditEvents]
  effect_safety_notes:
    - "ReserveInventory の本番 handler は timeout と bounded retry を必須にすること"
    - "bounded retry の詳細として指数バックオフを使う場合は運用設定で明示すること"
    - "TestInventoryHandler は test / local 以外で使わないこと"
    - "AppendAuditEvent は成功した重要操作ごとに必ず1回以上観測できること"
    - "ExportAuditEvents は actor の権限を guardrail と acceptance_tests で確認すること"

agent_runtime:
  allowed_tools:
    - name: get_order
      protocol: MCP
      effect: ReadDB
      input_schema_ref: schemas/GetOrderInput.json
      output_schema_ref: schemas/GetOrderOutput.json
      preconditions:
        - tenant_id_is_bound
        - caller_has_order_read_permission
      postconditions:
        - no_write_performed
        - pii_fields_redacted_unless_allowed
    - name: append_audit_event
      protocol: local
      effect: WriteAuditLog
      input_schema_ref: schemas/AppendAuditEventInput.json
      output_schema_ref: schemas/AppendAuditEventOutput.json
      audit_required: true
      retry_policy: bounded
    - name: validate_context_pack
      protocol: local
      effect: ReadRepo
      input_schema_ref: schemas/ContextPackPath.json
      output_schema_ref: schemas/ValidationResult.json
    - name: pii_redactor
      protocol: local
      effect: TransformText
      input_schema_ref: schemas/RedactionInput.json
      output_schema_ref: schemas/RedactionOutput.json
      postconditions:
        - pii_fields_redacted_unless_allowed
  forbidden_tools:
    - direct_sql_write
    - shell_without_sandbox
    - network_call_to_unregistered_endpoint
    - unredacted_pii_export
    - general_llm_without_redaction
  guardrails:
    input:
      - reject_cross_tenant_request
      - require_context_pack_validation_before_tool_plan
      - verify_external_api_call_budget_remaining
    output:
      - verify_no_secret_exfiltration
      - verify_diagram_and_acceptance_test_ids_are_referenced
      - reject_general_llm_without_redaction
    tool:
      - validate_tool_input_schema
      - validate_tool_output_schema
      - require_human_approval_for_write_effects
      - enforce_resource_constraints_before_tool_call
  trace_evidence:
    required_spans:
      - llm_generation
      - tool_call
      - guardrail_result
      - handoff
    required_artifacts:
      - validate-context-pack command result
      - PR URL and CI run URL
      - review comment or approval for write-effect tools
    retention_policy: project_default

resource_constraints:
  tool_budget:
    max_tool_calls: 40
    max_ci_minutes: 20
    max_external_api_calls: 3
    max_llm_retries: 2
  data_sensitivity:
    pii:
      policy: "顧客氏名・住所・決済情報は例題に含めない。必要な場合は匿名fixtureに置き換える"
      allowed_tools:
        - pii_redactor
      forbidden_tools:
        - general_llm_without_redaction
    audit_log: "payloadHash は改竄検知用の例であり、実データを公開しない"
  linear_resources:
    - id: IdempotencyKey
      rule:
        - "同一 key は同一 scope で一度だけ成功結果へ対応させる"
    - id: OneTimePaymentToken
      rule:
        - "再利用禁止。保存せず、handler 境界で破棄する"
    - id: payment_authorization_token
      kind: one_time_token
      rule:
        - must_not_duplicate
        - must_not_log
        - must_not_reuse
    - id: password_reset_token
      kind: one_time_token
      rule:
        - must_not_duplicate
        - must_not_log
        - must_not_reuse

change_semantics:
  allowed_refactors:
    - rename_private_method_without_behavior_change
    - extract_pure_function
    - "OrderService 内部の関数分割。ただし Morphism id と外部契約は維持する"
    - "AuditSearchView の検索UI改善。ただし AuditEvent の追記専用制約は維持する"
  forbidden_conflict_resolutions:
    - delete_failing_test
    - remove_audit_log_to_resolve_type_error
    - weaken_authorization_check
    - "OutOfStock を無視して PlaceOrder を成功扱いにすること"
    - "監査イベント重複を削除で解決すること"
  merge_invariants:
    - all_acceptance_tests_preserved
    - diagram_commutativity_preserved
    - context_pack_fields_not_silently_removed
    - "D1-idempotency-place-order を満たすこと"
    - "D2-audit-consistency を満たすこと"
    - "D3-state-transition-safety を満たすこと"

formalization_level:
  metaphor_only:
    - "サービス境界を Object、API操作を Morphism と呼ぶ説明は設計上の比喩であり、数学的証明ではない"
  machine_checked: []
  tested_by_ci:
    - "AT1-happy-path"
    - "AT2-invalid-transition"
    - "AT3-audit-search-export"
    - "context-pack-v2.schema.json による schema validation"
  reviewed_manually:
    - "data_contracts.mappings と diagrams の対応づけ"
    - "agent_runtime.guardrails が forbidden_tools と resource_constraints を矛盾なく扱うこと"
    - "resource_constraints.tool_budget が外部API呼び出し回数と LLM retry 回数を制限していること"
    - "resource_constraints.data_sensitivity.pii の allowed_tools / forbidden_tools が guardrails と整合していること"
    - "linear_resources の one-time token が複製・ログ出力・再利用禁止として扱われていること"
    - "change_semantics.forbidden_conflict_resolutions が forbidden_changes を merge / refactor レビューへ具体化していること"
